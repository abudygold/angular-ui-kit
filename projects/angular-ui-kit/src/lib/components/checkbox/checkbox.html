@let formField = field();
@let config = formField.config;

@if (config.label) {
	<mat-label [class]="config.labelClass || ''">
		{{ config.label }}
	</mat-label>
}

@if (config.checkbox?.isSelectAll) {
	<mat-checkbox
		[checked]="isAllSelected()"
		[indeterminate]="isIndeterminate()"
		[class]="config.selectAllClass || ''"
		[labelPosition]="config.checkbox?.align || 'after'"
		(change)="toggleAll($event)">
		{{ config.checkbox?.selectAllLabel || 'Select All' }}
	</mat-checkbox>
}

<div [class]="config.inputClass || ''">
	@for (option of normalizedOptions(); track option.value) {
		<mat-checkbox
			[class]="config.optionClass || ''"
			[checked]="isChecked(option.value)"
			[labelPosition]="config.checkbox?.align || 'after'"
			(change)="toggle(option.value, $event)">
			{{ option.label }}
		</mat-checkbox>
	}
</div>

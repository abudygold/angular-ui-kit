@let formField = field();
@let config = formField.config;

<mat-form-field [appearance]="config.appearance || 'outline'" class="tw:w-full">
	@if (config.label) {
		<mat-label [class]="config.labelClass || ''">
			{{ config.label }}
		</mat-label>
	}

	<textarea
		matInput
		[formField]="$any(formField.control)"
		[rows]="config.textarea?.rows"
		[class]="config.inputClass || ''"
		[placeholder]="config.placeholder || ''"
		(blur)="onBlur($event)"
		(input)="onInput($event)"
		(change)="onChange($event)"></textarea>

	@if (config.hint) {
		<mat-hint align="end" [class]="config.hintClass || ''">
			{{ config.hint }}
		</mat-hint>
	}

	@if (config.limit) {
		<mat-hint align="end" [class]="config.hintClass || ''">
			{{ valueLength() }} / {{ config.limit }}
		</mat-hint>
	}
</mat-form-field>

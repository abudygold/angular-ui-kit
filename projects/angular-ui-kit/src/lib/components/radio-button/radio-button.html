@let formField = field();
@let config = formField.config;

@if (config.label) {
	<mat-label [class]="config.labelClass || ''">
		{{ config.label }}
	</mat-label>
}

<mat-radio-group
	[formField]="$any(formField.control)"
	[class]="config.inputClass || ''"
	(change)="onChange($event)">
	@for (option of normalizedOptions(); track option.value) {
		<mat-radio-button [value]="option.value" [class]="config.optionClass || ''">
			{{ option.label }}
		</mat-radio-button>
	}
</mat-radio-group>

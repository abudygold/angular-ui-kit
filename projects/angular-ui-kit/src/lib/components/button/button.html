@let button = config();
@let isLoading = button.loading?.() || false;
@let isDisabled = button.disabled?.() || isLoading;

@switch (button.buttonType) {
	@case ('link') {
		<a mat-button [href]="button.href" [target]="button.target" [color]="button.color">
			{{ button.text }}
		</a>
	}

	@case ('icon') {
		<button
			mat-icon-button
			[color]="button.color"
			[disabled]="isDisabled"
			(click)="handleClick()">
			@if (isLoading) {
				<mat-spinner diameter="20" />
			} @else {
				<mat-icon>{{ button.icon }}</mat-icon>
			}
		</button>
	}

	@default {
		<button
			mat-button
			[attr.type]="button.buttonType ?? 'button'"
			[class]="buttonClass"
			[color]="button.color"
			[disabled]="isDisabled"
			(click)="handleClick()">
			@if (button.icon) {
				<mat-icon>
					{{ button.icon }}
				</mat-icon>
			}

			@if (isLoading) {
				<mat-spinner diameter="18" />
			} @else {
				<span>{{ button.text }}</span>
			}
		</button>
	}
}

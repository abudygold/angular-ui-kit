@let formField = field();
@let config = formField.config;
@let infiniteScroll = infiniteScrollConfig;

<mat-form-field [appearance]="config.appearance || 'outline'" class="tw:w-full">
	@if (config.label) {
		<mat-label [class]="config.labelClass || ''">
			{{ config.label }}
		</mat-label>
	}

	<mat-select
		msInfiniteScroll
		[formField]="$any(formField.control)"
		[class]="config.inputClass || ''"
		[multiple]="config.dropdown?.multiple || false"
		[placeholder]="config.placeholder || ''"
		[threshold]="infiniteScroll.threshold"
		[debounce]="infiniteScroll.debounce"
		[complete]="infiniteScroll.complete"
		[loading]="infiniteScroll.loading"
		[loadOnOpen]="infiniteScroll.loadOnOpen"
		[msInfiniteScrollDisabled]="!infiniteScroll.enabled || infiniteScroll.disabled"
		(infiniteScroll)="onInfiniteScroll($event)"
		(selectionChange)="onChange($event)">
		@for (option of normalizedOptions(); track option.value) {
			<mat-option [value]="option.value" [class]="config.optionClass || ''">
				{{ option.label }}
			</mat-option>
		}
	</mat-select>

	@if (config.hint) {
		<mat-hint align="end" [class]="config.hintClass || ''">
			{{ config.hint }}
		</mat-hint>
	}
</mat-form-field>

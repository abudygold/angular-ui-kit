@let formField = field();
@let config = formField.config;

<mat-form-field [appearance]="config.appearance || 'outline'" class="tw:w-full">
	@if (config.label) {
		<mat-label [class]="config.labelClass || ''">
			{{ config.label }}
		</mat-label>
	}

	<input
		matInput
		[matDatepicker]="picker"
		[formField]="$any(formField.control)"
		[class]="config.inputClass || ''"
		[placeholder]="config.placeholder || ''"
		[min]="config.datepicker?.minDate || null"
		[matDatepickerFilter]="config.datepicker?.filterDate || null"
		(dateChange)="onChange($event)"
		(blur)="onBlur($event)" />

	<mat-datepicker-toggle matIconSuffix [for]="picker" />
	<mat-datepicker #picker [dateClass]="$any(config.datepicker?.dateClass || null)" />

	@if (config.hint) {
		<mat-hint align="end" [class]="config.hintClass || ''">
			{{ config.hint }}
		</mat-hint>
	}
</mat-form-field>

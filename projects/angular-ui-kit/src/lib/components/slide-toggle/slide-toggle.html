@let formField = field();
@let config = formField.config;

<p>
	<mat-slide-toggle
		[formField]="$any(formField.control)"
		[class]="config.inputClass || ''"
		[labelPosition]="config.slideToggle?.labelPosition || 'after'"
		(change)="onChange($event)">
		{{ config.slideToggle?.label || config.label }}
	</mat-slide-toggle>
</p>
